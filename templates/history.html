<!DOCTYPE html>
<html>
<head>

    <title>FishyWebAI History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="navbar">

    <h1>📋 Scan History</h1>

    <div class="nav-links">

        <a href="/" class="nav-btn">🏠 Scanner</a>

        <a href="/history" class="nav-btn">📋 History</a>

        <a href="/dashboard" class="nav-btn">📊 Dashboard</a>

    </div>

</div>

    <table class="history-table">

        <tr>
            <th>ID</th>
            <th>URL</th>
            <th>Result</th>
            <th>Confidence</th>
            <th>Time</th>
        </tr>

        {% for scan in scans %}

        <tr>

            <td>{{ scan[0] }}</td>

            <td>{{ scan[1] }}</td>

            <td>{{ scan[2] }}</td>

            <td>{{ scan[3] }}%</td>

            <td>{{ scan[4] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
